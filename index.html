<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJMPRO-IX eRoutin9</title>
    <link rel="icon" type="image/png" href="erouting_logo_v4_circle.ico">
    <!-- Matching Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #64748b;
            --spinner-track: #e2e8f0;
            --spinner-top: #1e40af;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #94a3b8;
                --spinner-track: #334155;
                --spinner-top: #3b82f6;
            }
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--spinner-track);
            border-top: 4px solid var(--spinner-top);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        .loading-text {
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Animations */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.5; } 
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Initializing Workspace...</div>
    </div>

    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbyGDDotGoW_wEWr5LWiCz-9tWWVm5U_kBFt0mwb86oOLNmh1xZOYr9HFFtZ034aqQ/exec"

        allow="geolocation; microphone; camera; clipboard-read; clipboard-write"
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation allow-downloads"
        onload="hideLoader()">
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            const iframe = document.getElementById('appFrame');
            
            // Allow the GAS Vue app inside the iframe to finish mounting its DOM
            setTimeout(() => {
                loader.style.opacity = '0';
                iframe.style.opacity = '1'; // Fade in the iframe smoothly
                
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                    loader.style.display = 'none';
                }, 500);
            }, 800);
        }
    </script>

</body>
</html>
